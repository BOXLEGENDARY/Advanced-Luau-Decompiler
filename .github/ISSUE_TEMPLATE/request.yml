name: Request
description: Propose something new or an improvement.
labels: ["request"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thank you for your suggestion.
        Before submitting, please ensure this idea hasn't been proposed yet.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched for existing ideas regarding this.
          required: true
        - label: I understand this is a formal request for improvement.
          required: true

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: "A short, clear title for your request"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Explain what you want to add or change. How should it work?"
      placeholder: "Describe your idea in detail..."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why
      description: "Why is this needed? What are the benefits?"
      placeholder: "This would help because..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: "Any other details or examples to support your request."
