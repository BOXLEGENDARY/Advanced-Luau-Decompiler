name: Bug Report
description: Report a bug or an issue you encountered.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Please provide clear information.
        Before submitting, check if this issue has already been reported.
  - type: textarea
    id: description
    attributes:
      label: "What's wrong?"
      description: "Please describe the problem in detail so we can help you."
      placeholder: "Describe the bug here..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How did this happen? List the steps to see the issue."
      placeholder: |
        1. Go to...
        2. Click on...
        3. See what happens...
  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Information"
      description: "Add any other text-based details or error messages here."
